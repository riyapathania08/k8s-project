<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes CI/CD</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 300;
            color: #ddd;
        }

        .badge {
            margin-top: 20px;
            padding: 10px 20px;
            background: #00c9ff;
            color: black;
            border-radius: 25px;
            display: inline-block;
            font-weight: bold;
        }

        .footer {
            margin-top: 25px;
            font-size: 14px;
            color: #bbb;
        }

        .emoji {
            font-size: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="emoji">🚀</div>

        <h1>Kubernetes CI/CD Pipeline</h1>
        <h2>Automated Deployment using Jenkins + Docker + Kubernetes</h2>

        <div class="badge">✔ Successfully Deployed</div>

        <div class="footer">
            DevOps Project Demo | Auto Deployed via CI/CD
        </div>
    </div>

</body>
</html>
